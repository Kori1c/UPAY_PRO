<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPay Pro - 企业级加密货币支付网关</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: rgba(24, 24, 27, 0.6);
            --primary: #3b82f6;
            --success: #10b981;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            padding: 0 24px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 100px;
            color: var(--success);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
            background: linear-gradient(to bottom right, #fff 50%, #71717a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #fff;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(39, 39, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .floating-cards {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .card {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 16px;
            width: 200px;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .card-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .card-2 { top: 65%; left: 15%; animation-delay: 1s; }
        .card-3 { top: 20%; right: 10%; animation-delay: 2s; }
        .card-4 { top: 70%; right: 15%; animation-delay: 3s; }

        @media (max-width: 640px) {
            h1 { font-size: 36px; }
            p { font-size: 16px; }
            .cta-group { flex-direction: column; width: 100%; }
            .btn { justify-content: center; }
            .card { display: none; }
        }
    </style>
</head>
<body>
    <div class="floating-cards">
        <div class="card card-1">
            <div style="height: 12px; width: 60%; background: var(--border); border-radius: 4px; margin-bottom: 8px;"></div>
            <div style="height: 12px; width: 40%; background: var(--border); border-radius: 4px;"></div>
        </div>
        <div class="card card-2">
            <div style="height: 12px; width: 50%; background: var(--border); border-radius: 4px; margin-bottom: 8px;"></div>
            <div style="height: 12px; width: 70%; background: var(--border); border-radius: 4px;"></div>
        </div>
        <div class="card card-3"></div>
        <div class="card card-4"></div>
    </div>

    <main class="hero">
        <div class="badge">
            <div class="badge-dot"></div>
            系统运行正常 · v1.2.0
        </div>
        <h1>UPay Pro</h1>
        <p>
            下一代企业级加密货币支付网关。<br>
            支持多链秒级监控、自动汇率转换与高并发订单处理。
        </p>
        
        <div class="cta-group">
            <a href="/login" class="btn btn-primary">
                进入管理后台
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            <a href="https://github.com" target="_blank" class="btn btn-secondary">
                查看文档
            </a>
        </div>
    </main>

    <footer style="position: absolute; bottom: 32px; color: var(--text-secondary); font-size: 13px;">
        &copy; 2026 UPay Pro. All rights reserved.
    </footer>
</body>
</html>
