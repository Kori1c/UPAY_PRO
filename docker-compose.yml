services:
  app:
    image: ${UPAY_IMAGE:-ghcr.io/kori1c/upay-pro:latest}
    container_name: upay-pro-app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      GIN_MODE: release
      TZ: Asia/Shanghai
      UPAY_HTTP_PORT: 8090
      UPAY_APP_URL: ${UPAY_APP_URL:-https://pay.example.com}
      UPAY_REDIS_HOST: redis
      UPAY_REDIS_PORT: 6379
      UPAY_REDIS_DB: 0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8090:8090"
    restart: unless-stopped
    volumes:
      - ./DBS:/app/DBS
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    container_name: upay-pro-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    volumes:
      - upay_redis:/data

volumes:
  upay_redis:
